```html
<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    >

    <meta
        name="theme-color"
        content="#0d1018"
    >

    <title>Owl Post</title>

    <!-- Fonts -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=IM+Fell+English&family=Cormorant+Garamond:wght@400;500;600;700&display=swap"
        rel="stylesheet"
    >

    <!-- GSAP -->

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- =====================================
         APP ROOT
    ====================================== -->

    <main id="app">

        <!-- =====================================
             BACKGROUND
        ====================================== -->

        <div id="background-layer">

            <div id="hogwarts-bg"></div>

            <div id="background-vignette"></div>

            <div id="background-fog"></div>

        </div>

        <!-- =====================================
             DUST PARTICLES
        ====================================== -->

        <div id="dust-container"></div>

        <!-- =====================================
             GOLDEN SPARKS
        ====================================== -->

        <div id="spark-container"></div>

        <!-- =====================================
             OWL DELIVERY SCENE
        ====================================== -->

        <section id="owl-scene">

            <!-- Owl -->

            <div id="owl-wrapper">

                <img
                    id="owl"
                    src="assets/owl-frame-1.png"
                    alt="Owl carrying a letter"
                    draggable="false"
                >

            </div>

            <!-- Floating Envelope
                 Hidden initially
            -->

            <div id="delivery-envelope">

                <img
                    src="assets/envelope.png"
                    alt="Envelope"
                    draggable="false"
                >

            </div>

            <!-- Tap Instruction -->

            <div id="tap-hint">

                <div class="hint-glow"></div>

                <span>
                    Tap the Owl
                </span>

            </div>

        </section>

        <!-- =====================================
             LETTER SCENE
        ====================================== -->

        <section id="letter-scene">

            <!-- Seal Overlay -->

            <div id="seal-container">

                <img
                    id="seal"
                    src="assets/wax-seal.png"
                    alt="Wax Seal"
                    draggable="false"
                >

            </div>

            <!-- Parchment -->

            <div id="letter-container">

                <!-- Main Letter Artwork -->

                <img
                    id="letter-art"
                    src="assets/opened-letter.png"
                    alt="Parchment Letter"
                    draggable="false"
                >

                <!-- Candle Glow -->

                <div id="candle-glow"></div>

                <!-- Letter Content -->

                <div id="letter-content-area">

                    <div id="letter-content"></div>

                    <span id="quill-cursor">
                        |
                    </span>

                </div>

            </div>

        </section>

        <!-- =====================================
             ENDING SCENE
        ====================================== -->

        <section id="ending-scene">

            <div id="ending-content">

                <div class="star-row">
                    ✦ ✦ ✦
                </div>

                <h2>
                </h2>

                <div class="star-row">
                    ✦ ✦ ✦
                </div>

            </div>

        </section>

        <div id="music-control-bar">
            <div id="music-control-text">Play this week's music?</div>
            <button id="music-toggle-button" type="button">Play</button>
        </div>

    </main>

    <!-- =====================================
         AUDIO
    ====================================== -->

    <audio
        id="music"
        preload="auto"
        playsinline
    ></audio>

    <audio
        id="ambient"
        preload="auto"
        playsinline
    ></audio>

    <audio
        id="owl-wing"
        preload="auto"
        playsinline
    ></audio>

    <audio
        id="seal-break"
        preload="auto"
        playsinline
    ></audio>

    <audio
        id="paper-open"
        preload="auto"
        playsinline
    ></audio>

    <!-- =====================================
         PRELOAD IMPORTANT IMAGES
    ====================================== -->

    <link
        rel="preload"
        as="image"
        href="assets/hogwarts-night.png"
    >

    <link
        rel="preload"
        as="image"
        href="assets/owl-frame-1.png"
    >

    <link
        rel="preload"
        as="image"
        href="assets/owl-frame-2.png"
    >

    <link
        rel="preload"
        as="image"
        href="assets/owl-frame-3.png"
    >

    <link
        rel="preload"
        as="image"
        href="assets/envelope.png"
    >

    <link
        rel="preload"
        as="image"
        href="assets/opened-letter.png"
    >

    <link
        rel="preload"
        as="image"
        href="assets/wax-seal.png"
    >

    <!-- =====================================
         SCRIPT
    ====================================== -->

    <script src="script.js"></script>

</body>
</html>
```
